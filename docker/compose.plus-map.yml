# Plus-Map Stack — eigenständiger Compose-Stack für die Test-Instanz auf Nodica1.
#
# Liegt in Co-Existenz neben dem bestehenden Plus-Map-Stack auf demselben Host:
# Stack-Name "plus-map" (statt "plus-map"), eigene Container, eigene Volumes,
# eigenes Netzwerk, eigene Host-Loopback-Ports (3100/8100 statt 3000/8000).
#
# Reverse-Proxy: Frontend und Backend werden auf 127.0.0.1:{3100,8100}
# gebunden. Der bestehende Caddy/Traefik auf dem Host bekommt einen
# zusätzlichen Vhost-Eintrag für die Subdomain (z. B. plus-map.<domain>),
# der dorthin weiterleitet. Kein gemeinsamer Reverse-Proxy-Container.
#
# Build: lokal aus diesem Repo. Die Tarn-UI-Strings sind nur in diesem
# Repo enthalten, also keine vorgebauten GHCR-Images verwenden.
#
# Start:
#   cp .env.example .env.plus-map
#   # .env.plus-map editieren: PLUSMAP_DB_PASSWORD, PLUSMAP_SECRET_KEY,
#   # PLUSMAP_BASE_URL=https://plus-map.<deine-domain>, ggf. PLUSMAP_MAPTILER_API_KEY
#   docker compose -f docker/compose.plus-map.yml --env-file .env.plus-map up -d --build

name: plus-map

x-restart: &restart
  restart: unless-stopped

services:
  db:
    <<: *restart
    image: postgis/postgis:16-3.5
    container_name: plus-map-db
    environment:
      POSTGRES_USER: ${PLUSMAP_DB_USER:?PLUSMAP_DB_USER is required}
      POSTGRES_PASSWORD: ${PLUSMAP_DB_PASSWORD:?PLUSMAP_DB_PASSWORD is required}
      POSTGRES_DB: ${PLUSMAP_DB_NAME:?PLUSMAP_DB_NAME is required}
    volumes:
      - plus-map-db-data:/var/lib/postgresql/data
    networks:
      - plus-map-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLUSMAP_DB_USER} -d ${PLUSMAP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    <<: *restart
    container_name: plus-map-backend
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      PLUSMAP_ENVIRONMENT: production
      PLUSMAP_LOG_LEVEL: ${PLUSMAP_LOG_LEVEL:-INFO}
      PLUSMAP_DATABASE_URL: postgresql+asyncpg://${PLUSMAP_DB_USER}:${PLUSMAP_DB_PASSWORD}@db:5432/${PLUSMAP_DB_NAME}
      PLUSMAP_SECRET_KEY: ${PLUSMAP_SECRET_KEY:?PLUSMAP_SECRET_KEY is required (>=32 chars)}
      PLUSMAP_COOKIE_SECURE: "true"
      PLUSMAP_COOKIE_DOMAIN: ${PLUSMAP_COOKIE_DOMAIN:-}
      PLUSMAP_COOKIE_LIFETIME_SECONDS: ${PLUSMAP_COOKIE_LIFETIME_SECONDS:-604800}
      PLUSMAP_BASE_URL: ${PLUSMAP_BASE_URL:?PLUSMAP_BASE_URL is required (e.g. https://plus-map.example.org)}
      PLUSMAP_SKIP_MIGRATIONS: ${PLUSMAP_SKIP_MIGRATIONS:-0}
      PLUSMAP_MAPTILER_API_KEY: ${PLUSMAP_MAPTILER_API_KEY:-}
      PLUSMAP_MAPTILER_STYLE: ${PLUSMAP_MAPTILER_STYLE:-basic-v2}
      PLUSMAP_GEOCODE_RATE_PER_MINUTE: ${PLUSMAP_GEOCODE_RATE_PER_MINUTE:-30}
      PLUSMAP_SMTP_HOST: ${PLUSMAP_SMTP_HOST:-}
      PLUSMAP_SMTP_PORT: ${PLUSMAP_SMTP_PORT:-587}
      PLUSMAP_SMTP_USER: ${PLUSMAP_SMTP_USER:-}
      PLUSMAP_SMTP_PASSWORD: ${PLUSMAP_SMTP_PASSWORD:-}
      PLUSMAP_SMTP_STARTTLS: ${PLUSMAP_SMTP_STARTTLS:-true}
      PLUSMAP_SMTP_USE_TLS: ${PLUSMAP_SMTP_USE_TLS:-false}
      PLUSMAP_SMTP_FROM: ${PLUSMAP_SMTP_FROM:-}
      PLUSMAP_SMTP_FROM_NAME: ${PLUSMAP_SMTP_FROM_NAME:-Plus-Map}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--proxy-headers", "--forwarded-allow-ips", "*"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8100:8000"
    networks:
      - plus-map-internal

  frontend:
    <<: *restart
    container_name: plus-map-frontend
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_TILE_URL: ${NEXT_PUBLIC_TILE_URL:-/api/tiles/{z}/{x}/{y}}
      NEXT_PUBLIC_DEFAULT_MAP_CENTER: ${NEXT_PUBLIC_DEFAULT_MAP_CENTER:-49.7913,11.5092}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - plus-map-internal

networks:
  plus-map-internal:
    driver: bridge
    name: plus-map-internal

volumes:
  plus-map-db-data:
    name: plus-map-db-data

# Traefik reverse-proxy overlay for Plus-Map (M10.5, ADR-051 §B).
#
# Usage:
#   docker compose -f docker/compose.prod.yml -f docker/compose.traefik.yml \
#     --env-file .env.prod up -d
#
# Required env (see .env.example "Production / Reverse-Proxy" block):
#   PLUSMAP_DOMAIN         e.g. plus-map.example.org
#   PLUSMAP_ACME_EMAIL     contact for Let's Encrypt registration
#
# Static + dynamic config live next to this file at
# docker/traefik/traefik.yml + docker/traefik/dynamic.yml — both are
# copies of the .example files included in the repo.

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    environment:
      PLUSMAP_DOMAIN: ${PLUSMAP_DOMAIN:?PLUSMAP_DOMAIN is required for the Traefik overlay}
      PLUSMAP_ACME_EMAIL: ${PLUSMAP_ACME_EMAIL:?PLUSMAP_ACME_EMAIL is required for Let's Encrypt}
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-acme:/letsencrypt
      # Traefik's docker provider (configured in traefik.yml.example) reads
      # service labels via this socket — read-only, never writable. Without
      # this mount the provider crashes with "Cannot connect to the Docker
      # daemon" and labelled routes never become active.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  # Routing rules for backend/frontend are attached as labels so the
  # router config stays close to the service definitions.
  backend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.plusmap-backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.plusmap-backend-api.rule=Host(`${PLUSMAP_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/sqladmin`))"
      - "traefik.http.routers.plusmap-backend-api.entrypoints=websecure"
      - "traefik.http.routers.plusmap-backend-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.plusmap-backend-api.service=plusmap-backend"

  frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.plusmap-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.plusmap-frontend.rule=Host(`${PLUSMAP_DOMAIN}`)"
      - "traefik.http.routers.plusmap-frontend.entrypoints=websecure"
      - "traefik.http.routers.plusmap-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.plusmap-frontend.service=plusmap-frontend"
      - "traefik.http.routers.plusmap-frontend.priority=1"

volumes:
  traefik-acme:

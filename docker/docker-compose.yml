# Local development compose file.
# Run from repo root: docker compose -f docker/docker-compose.yml up --build
#
# Production topology lives in docker-compose.prod.yml (added in M10).

name: plus-map

services:
  db:
    image: postgis/postgis:16-3.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PLUSMAP_DB_USER:-plusmap}
      POSTGRES_PASSWORD: ${PLUSMAP_DB_PASSWORD:-plusmap}
      POSTGRES_DB: ${PLUSMAP_DB_NAME:-plusmap}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLUSMAP_DB_USER:-plusmap} -d ${PLUSMAP_DB_NAME:-plusmap}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      PLUSMAP_ENVIRONMENT: ${PLUSMAP_ENVIRONMENT:-development}
      PLUSMAP_LOG_LEVEL: ${PLUSMAP_LOG_LEVEL:-INFO}
      PLUSMAP_DATABASE_URL: postgresql+asyncpg://${PLUSMAP_DB_USER:-plusmap}:${PLUSMAP_DB_PASSWORD:-plusmap}@db:5432/${PLUSMAP_DB_NAME:-plusmap}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SSR fetch target inside the compose network (ADR-053, M11-HOTFIX-001).
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  db-data:

# Production compose for Plus-Map (M10.5, ADR-051 §B/§F).
#
# This file ships ONLY the application services (db, backend, frontend).
# A reverse-proxy is added by composing one of the overlay files:
#
#   docker compose -f docker/compose.prod.yml -f docker/compose.caddy.yml \
#     --env-file .env.prod up -d
#
#   docker compose -f docker/compose.prod.yml -f docker/compose.traefik.yml \
#     --env-file .env.prod up -d
#
# Operators with an existing reverse-proxy can publish backend:8000 and
# frontend:3000 to host loopback themselves and skip the overlays — see
# ops/runbook.md (M10.8).
#
# Backend image runs alembic migrations under a Postgres advisory lock on
# startup; override with PLUSMAP_SKIP_MIGRATIONS=1 for emergency rollbacks.
# Backup service (M10.6) is the fourth default service; it requires
# docker/secrets/{age-recipients.txt,rclone.conf} to be present and the
# PLUSMAP_BACKUP_REMOTE/PLUSMAP_BACKUP_PREFIX env vars to be set. See
# ops/runbook.md (M10.8).

name: plus-map

x-restart: &restart
  restart: unless-stopped

services:
  db:
    <<: *restart
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: ${PLUSMAP_DB_USER:?PLUSMAP_DB_USER is required}
      POSTGRES_PASSWORD: ${PLUSMAP_DB_PASSWORD:?PLUSMAP_DB_PASSWORD is required}
      POSTGRES_DB: ${PLUSMAP_DB_NAME:?PLUSMAP_DB_NAME is required}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLUSMAP_DB_USER} -d ${PLUSMAP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    <<: *restart
    image: ghcr.io/paddel87/plus-map-backend:${PLUSMAP_IMAGE_TAG:-rc}
    pull_policy: always
    environment:
      PLUSMAP_ENVIRONMENT: production
      PLUSMAP_LOG_LEVEL: ${PLUSMAP_LOG_LEVEL:-INFO}
      PLUSMAP_DATABASE_URL: postgresql+asyncpg://${PLUSMAP_DB_USER}:${PLUSMAP_DB_PASSWORD}@db:5432/${PLUSMAP_DB_NAME}
      PLUSMAP_SECRET_KEY: ${PLUSMAP_SECRET_KEY:?PLUSMAP_SECRET_KEY is required (>=32 chars)}
      PLUSMAP_COOKIE_SECURE: "true"
      PLUSMAP_COOKIE_DOMAIN: ${PLUSMAP_COOKIE_DOMAIN:-}
      PLUSMAP_COOKIE_LIFETIME_SECONDS: ${PLUSMAP_COOKIE_LIFETIME_SECONDS:-604800}
      PLUSMAP_BASE_URL: ${PLUSMAP_BASE_URL:?PLUSMAP_BASE_URL is required (e.g. https://plus-map.example.org)}
      PLUSMAP_SKIP_MIGRATIONS: ${PLUSMAP_SKIP_MIGRATIONS:-0}
      PLUSMAP_MAPTILER_API_KEY: ${PLUSMAP_MAPTILER_API_KEY:-}
      PLUSMAP_MAPTILER_STYLE: ${PLUSMAP_MAPTILER_STYLE:-basic-v2}
      PLUSMAP_GEOCODE_RATE_PER_MINUTE: ${PLUSMAP_GEOCODE_RATE_PER_MINUTE:-30}
      PLUSMAP_SMTP_HOST: ${PLUSMAP_SMTP_HOST:-}
      PLUSMAP_SMTP_PORT: ${PLUSMAP_SMTP_PORT:-587}
      PLUSMAP_SMTP_USER: ${PLUSMAP_SMTP_USER:-}
      PLUSMAP_SMTP_PASSWORD: ${PLUSMAP_SMTP_PASSWORD:-}
      PLUSMAP_SMTP_STARTTLS: ${PLUSMAP_SMTP_STARTTLS:-true}
      PLUSMAP_SMTP_USE_TLS: ${PLUSMAP_SMTP_USE_TLS:-false}
      PLUSMAP_SMTP_FROM: ${PLUSMAP_SMTP_FROM:-}
      PLUSMAP_SMTP_FROM_NAME: ${PLUSMAP_SMTP_FROM_NAME:-Plus-Map}
    # Trust proxy headers from the reverse-proxy overlay (which is the only
    # service inside the docker network that can set them). External clients
    # cannot inject them because the backend is not exposed to the host.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000",
              "--proxy-headers", "--forwarded-allow-ips", "*"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    <<: *restart
    image: ghcr.io/paddel87/plus-map-frontend:${PLUSMAP_IMAGE_TAG:-rc}
    pull_policy: always
    environment:
      NODE_ENV: production
      # Server-side fetch target for Next.js SSR (read at request time from
      # process.env). Default points at the in-network backend service. See
      # ADR-053 / M11-HOTFIX-001. Override via .env.prod only if the topology
      # changes (e.g. external reverse-proxy outside this compose network).
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
      NEXT_PUBLIC_TILE_URL: ${NEXT_PUBLIC_TILE_URL:-/api/tiles/{z}/{x}/{y}}
      NEXT_PUBLIC_DEFAULT_MAP_CENTER: ${NEXT_PUBLIC_DEFAULT_MAP_CENTER:-52.5200,13.4050}
    depends_on:
      - backend
    networks:
      - internal

  # Backup service (M10.6, ADR-051 §D): pg_dump | age | rclone via cron.
  # Schedule (UTC): daily 03:17, weekly Sun 03:33, monthly 1st 03:47,
  # retention sweep 04:00 (14d/56d/365d).
  backup:
    <<: *restart
    image: ghcr.io/paddel87/plus-map-backup:${PLUSMAP_IMAGE_TAG:-rc}
    pull_policy: always
    environment:
      PLUSMAP_BACKUP_REMOTE: ${PLUSMAP_BACKUP_REMOTE:?PLUSMAP_BACKUP_REMOTE is required (rclone remote name)}
      PLUSMAP_BACKUP_PREFIX: ${PLUSMAP_BACKUP_PREFIX:?PLUSMAP_BACKUP_PREFIX is required (path prefix on remote)}
      PLUSMAP_BACKUP_RUN_ON_START: ${PLUSMAP_BACKUP_RUN_ON_START:-0}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${PLUSMAP_DB_USER}
      PGPASSWORD: ${PLUSMAP_DB_PASSWORD}
      PGDATABASE: ${PLUSMAP_DB_NAME}
    secrets:
      - source: age-recipients
        target: age-recipients.txt
        mode: "0440"
      - source: rclone-conf
        target: rclone.conf
        mode: "0440"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

secrets:
  age-recipients:
    file: ./secrets/age-recipients.txt
  rclone-conf:
    file: ./secrets/rclone.conf

networks:
  internal:
    driver: bridge

volumes:
  db-data:

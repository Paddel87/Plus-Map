name: Release

# M10.7, ADR-051 §E. Triggered by `v*.*.*` tags. Creates a GitHub release
# whose body is auto-extracted from CHANGELOG.md (the section matching the
# tag, fallback to "[Unreleased]"). Pre-releases (tags containing a hyphen,
# e.g. v0.1.0-rc.1) are flagged as such.
#
# Image publishing is handled by the CI workflow's build-push job, which
# runs in parallel on the same tag — this workflow only manages the GitHub
# release itself.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag context
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          version="${{ steps.tag.outputs.version }}"
          notes_file=$(mktemp)
          # Match either "## [vX.Y.Z]" or "## [X.Y.Z]" or, for pre-releases,
          # fall back to the "[Unreleased]" section so an RC release ships
          # the in-progress changelog.
          awk -v v="$version" -v t="$tag" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) { exit }
              if ($0 ~ "\\["v"\\]" || $0 ~ "\\["t"\\]" || (t ~ /-/ && $0 ~ /\[Unreleased\]/)) {
                found = 1
                next
              }
            }
            found { print }
          ' CHANGELOG.md > "$notes_file"
          if [[ ! -s "$notes_file" ]]; then
            echo "(see CHANGELOG.md for details)" > "$notes_file"
          fi
          {
            echo "notes_file=${notes_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail
          args=(--title "$TAG" --notes-file "$NOTES_FILE")
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" "${args[@]}"

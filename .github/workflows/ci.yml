name: CI

# M10.7, ADR-051 §E. Three jobs:
#   1. backend-lint-test  — ruff + format-check + mypy --strict + pytest
#                           against a Postgres+PostGIS service container.
#   2. frontend-lint-test — typecheck + lint + format:check + vitest run.
#   3. build-push         — multi-arch (amd64/arm64) build of backend,
#                           frontend, and backup images. Pushes to GHCR
#                           only on `main` and `v*.*.*` tags.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

# Allow only one concurrent run per ref; cancel older queued runs on push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Backend: lint, format-check, type-check, pytest against Postgres.
  # ------------------------------------------------------------------
  backend-lint-test:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_USER: hcmap
          POSTGRES_PASSWORD: hcmap
          POSTGRES_DB: hcmap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hcmap -d hcmap_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      # Skip testcontainers fallback in conftest.py — use the service DB.
      HCMAP_TEST_DATABASE_URL: postgresql+psycopg://hcmap:hcmap@localhost:5432/hcmap_test
      UV_NO_PROGRESS: "1"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        # M10.7.1: pinned to immutable v8.1.0 — astral-sh/setup-uv@v8
        # dropped floating major/minor tags as a supply-chain hardening
        # measure (see release notes for v8.0.0). Bump deliberately.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy strict
        run: uv run mypy --strict app

      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U hcmap >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready"; exit 1

      - name: Pytest
        run: uv run pytest -ra

  # ------------------------------------------------------------------
  # Frontend: typecheck, lint, format-check, vitest.
  # ------------------------------------------------------------------
  frontend-lint-test:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Vitest
        run: pnpm test --run

  # ------------------------------------------------------------------
  # Multi-arch image build + GHCR push. Only on main / v*.*.* tags.
  # ------------------------------------------------------------------
  build-push:
    name: Build & push (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [backend-lint-test, frontend-lint-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: docker/backend.Dockerfile
          - image: frontend
            dockerfile: docker/frontend.Dockerfile
          - image: backup
            dockerfile: docker/backup.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag schema (ADR-051 §E):
      #   tag v0.1.0-rc.1   → :v0.1.0-rc.1, :rc
      #   tag v0.1.0        → :v0.1.0, :v0.1, :0, :latest
      #   push to main      → :main, :sha-<short>
      # docker/metadata-action emits {{major}}.{{minor}} and {{major}} only
      # for stable semver tags (no pre-release suffix), so :v0.1 and :0
      # naturally show up only on the final tag, not on -rc.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/paddel87/hc-map-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=rc,enable=${{ contains(github.ref, '-rc.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: false

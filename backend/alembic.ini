; Alembic configuration. The DSN comes from the PLUSMAP_DATABASE_URL env var
; (read in migrations/env.py); the placeholder below is only used by the
; CLI when env.py cannot be loaded.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = postgresql+psycopg://plusmap:plusmap@db:5432/plusmap
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC

[post_write_hooks]
hooks = ruff, ruff_format
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix --select I,F401 REVISION_SCRIPT_FILENAME
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
